# Test configuration for the cxx_modules_optin example

[test]
description = "Module units in .cpp files (env.cxx.modules opt-in)"

expected_outputs = [
    "build/obj.hello/src/Math.cpp.o",
    "build/obj.hello/src/main.cpp.o",
    "build/hello",
]

[verify]
commands = [
    { run = "./build/hello", expect_exit_code = 0 },
]

[skip]
requires = ["clang-scan-deps", "clang++"]
generators = ["xcode", "make"]
