# Test configuration for subdirs example

[test]
description = "Demonstrates multi-level subdirectories with C++20 named modules"

expected_outputs = [
    "build/a/aa/libaa.a",
    "build/a/liba.a",
    "build/a/a_app",
    "build/b/bb/libbb.a",
    "build/b/libb.a",
    "build/b/b_app",
    "build/app/app",
]

[toolchains]
linux = ["gcc", "llvm"]
darwin = ["llvm"]
windows = ["msvc"]

[verify]
commands = [
    { run = "./build/a/a_app", expect_stdout = "" },
    { run = "./build/b/b_app", expect_stdout = "" },
    { run = "./build/app/app", expect_stdout = "" },
]

[skip]
# Named modules: MSVC scans natively (cl.exe), GCC via g++, clang via
# clang-scan-deps. Gate per toolchain so an MSVC-only Windows host still runs.
requires_cxx_modules = true
generators = ["xcode", "make"]
