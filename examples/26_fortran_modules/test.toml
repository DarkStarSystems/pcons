# Test configuration for the fortran_modules example

[test]
description = "Demonstrates Fortran modules with correct dyndep dependency ordering"

expected_outputs = [
    "build/obj.hello/src/greetings.f90.o",
    "build/obj.hello/src/main.f90.o",
    "build/hello",
]

[verify]
commands = [
    { run = "./build/hello", expect_stdout = "Hello from Fortran module!" },
]

[skip]
platforms = ["windows"]
requires = ["gfortran"]
# Xcode generator does not support Fortran
# Make generator doesn't support Ninja dyndep for Fortran module ordering
generators = ["xcode", "make"]
