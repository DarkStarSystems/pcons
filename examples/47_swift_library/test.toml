# Test configuration for the swift_library example

[test]
description = "Demonstrates a Swift library with cross-module import and a Test() target"

expected_outputs = [
    "build/shapes",
    "build/swiftmodules/Geometry.swiftmodule",
]

[verify]
commands = [
    { run = "./build/shapes", expect_stdout = "Circle r=2.0 area=12.57" },
]

[skip]
requires = ["swiftc"]
platforms = ["windows"]
generators = ["xcode", "make"]
