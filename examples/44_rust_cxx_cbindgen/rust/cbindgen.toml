language = "C"
include_guard = "RUST_MATH_H"
autogen_warning = "/* Generated by cbindgen — do not edit. */"
no_includes = false
sys_includes = ["stddef.h", "stdint.h"]
# Wrap declarations in `extern "C"` when included from C++.
cpp_compat = true

[export]
include = ["Stats", "rust_math_stats", "rust_math_clamp"]

[fn]
prefix = ""
