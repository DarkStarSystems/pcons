# Test configuration for the restat example

[test]
description = "Demonstrates restat to avoid unnecessary rebuilds from code generators"

expected_outputs = [
    "build/version.h",
    "build/app",
]

[verify]
commands = [
    { run = "cat build/version.h", expect_stdout = '#define VERSION "1.0.0"' },
]

[skip]
# Makefile generator doesn't support restat
generators = ["make", "xcode"]
