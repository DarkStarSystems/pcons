# Test configuration for the swift_cxx_interop example

[test]
description = "Demonstrates bidirectional Swift/C/C++ interop (modulemap import + generated -Swift.h)"

expected_outputs = [
    "build/interop_demo",
    "build/swiftmodules/Analyzer-Swift.h",
]

[verify]
commands = [
    { run = "./build/interop_demo", expect_stdout = "scaled mean = 40" },
]

[skip]
requires = ["swiftc"]
# C++ interop header consumption is macOS-only for now: on Linux the
# generated -Swift.h is sensitive to the Swift version and the local
# C++ standard library (clang + gcc libstdc++ mismatches), which varies
# across distros/runners. Pure Swift (46/47) still runs on Linux.
platforms = ["windows", "linux"]
generators = ["xcode", "make"]
