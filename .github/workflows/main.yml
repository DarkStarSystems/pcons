name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
    tags:
      - 'v*'  # Also run CI on version tags
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync
      - name: Run ruff
        run: uv run ruff check pcons/ tests/
      - name: Run ruff format check
        run: uv run ruff format --check pcons/ tests/
      - name: Run ty typecheck
        run: uvx ty check pcons/

  test:
    needs: lint
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        exclude:
          # Only test oldest Python on Ubuntu 22.04
          - os: ubuntu-22.04
            python-version: "3.12"
          - os: ubuntu-22.04
            python-version: "3.13"
          - os: ubuntu-22.04
            python-version: "3.14"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "latest"
      - name: Set up MSVC (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
      - name: Set Python version
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: uv python install $PYTHON_VERSION
      - name: Install LaTeX (one Ubuntu job only)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq texlive-latex-base texlive-bibtex-extra latexmk >/dev/null 2>&1
      - name: Install dependencies
        run: uv sync
      - name: Extend Conan settings for new Apple Clang versions (macOS)
        if: runner.os == 'macOS'
        run: |
          CONAN_HOME=$(uvx conan config home)
          cat > "$CONAN_HOME/settings_user.yml" << 'EOF'
          compiler:
              apple-clang:
                  version: ["18"]
          EOF
      - name: Run unit tests (Windows)
        if: runner.os == 'Windows'
        run: uv run pytest --cov=pcons --cov-report=xml --ignore=tests/test_examples.py -k "not 21_msvcup_hello"
      - name: Run tests (non-Windows)
        if: runner.os != 'Windows'
        run: uv run pytest --cov=pcons --cov-report=xml -k "not 21_msvcup_hello"
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ${{ matrix.os }}

  test-examples-windows:
    name: "test examples (windows-latest, ${{ matrix.python-version }})"
    needs: lint
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "latest"
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
      - name: Set Python version
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: uv python install $PYTHON_VERSION
      - name: Install dependencies
        run: uv sync
      - name: Run example tests
        run: uv run pytest tests/test_examples.py --cov=pcons --cov-report=xml -k "not 21_msvcup_hello"
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: windows-examples

  test-wasm:
    name: "test wasm (emscripten + wasi)"
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "latest"
      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@667eb33f24e84e7f362c16d8d7fff0629a73e15e # v15
        with:
          actions-cache-folder: 'emsdk-cache'
      - name: Install wasi-sdk
        run: |
          WASI_VERSION=32  # v31 was broken on macOS: hardcoded rpath (wasi-sdk#622), fixed in v32
          WASI_VERSION_FULL=${WASI_VERSION}.0
          ARCH=$(uname -m)
          case "$(uname -s)" in
            Linux)  OS=linux ;;
            Darwin) OS=macos ;;
            *)      echo "Unsupported OS"; exit 1 ;;
          esac
          curl -sSfL "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_VERSION}/wasi-sdk-${WASI_VERSION_FULL}-${ARCH}-${OS}.tar.gz" | tar xz
          sudo mv "wasi-sdk-${WASI_VERSION_FULL}-${ARCH}-${OS}" /opt/wasi-sdk
      - name: Install wasmtime
        uses: jcbhmr/setup-wasmtime@960c367a99921eb0b02f5778fce9ae8f110bf0f0 # v2
      - name: Install dependencies
        run: uv sync
      - name: Verify Emscripten tools
        run: |
          emcc --version
          node --version
      - name: Verify WASI tools
        id: verify-wasi
        continue-on-error: true
        run: |
          wasmtime --version
          /opt/wasi-sdk/bin/clang --version
      - name: Run Emscripten example tests
        run: uv run pytest tests/test_examples.py --cov=pcons --cov-report=xml -v -k "23_wasm_emscripten"
      - name: Run WASI example tests
        if: steps.verify-wasi.outcome == 'success'
        env:
          WASI_SDK_PATH: /opt/wasi-sdk
        run: uv run pytest tests/test_examples.py --cov=pcons --cov-report=xml --cov-append -v -k "22_wasm_wasi"
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: wasm

  test-msvcup:
    name: "test msvcup (windows, no VS)"
    needs: lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "latest"
      # No MSVC setup - msvcup installs its own toolchain
      - name: Set Python version
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync
      - name: Run msvcup example tests
        run: uv run pytest tests/test_examples.py --cov=pcons --cov-report=xml -k "21_msvcup_hello" tests/contrib/test_msvcup.py -v
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: msvcup

  test-cxx-modules:
    name: "test C++20 modules (${{ matrix.os }})"
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "latest"
      - name: Set up clang tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo update-alternatives --install /usr/bin/clang-scan-deps clang-scan-deps \
            /usr/bin/clang-scan-deps-18 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ \
            /usr/bin/clang++-18 100
          sudo update-alternatives --install /usr/bin/clang clang \
            /usr/bin/clang-18 100
      - name: Add Homebrew LLVM to PATH (macOS)
        if: runner.os == 'macOS'
        run: echo "$(brew --prefix llvm@18)/bin" >> $GITHUB_PATH
      - name: Install dependencies
        run: uv python install 3.12 && uv sync
      - name: Run C++20 modules example tests
        run: uv run pytest tests/test_examples.py --cov=pcons --cov-report=xml -k "29_cxx_modules" -v
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: cxx-modules

  release:
    name: Create Release & Publish
    needs: [test, test-examples-windows, test-wasm, test-msvcup, test-cxx-modules]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "latest"
      - name: Generate Changelog
        run: .github/release_message.sh > release_message.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          body_path: release_message.md
      - name: Build package
        run: uv build
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: uvx twine upload dist/*
