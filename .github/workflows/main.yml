name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
    tags:
      - 'v*'  # Also run CI on version tags
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync
      - name: Run ruff
        run: uv run ruff check pcons/ tests/
      - name: Run ruff format check
        run: uv run ruff format --check pcons/ tests/
      - name: Run ty typecheck
        run: uvx ty check pcons/

  test:
    needs: lint
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        exclude:
          # Only test oldest Python on Ubuntu 22.04
          - os: ubuntu-22.04
            python-version: "3.12"
          - os: ubuntu-22.04
            python-version: "3.13"
          - os: ubuntu-22.04
            python-version: "3.14"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
      - name: Set up MSVC (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
      - name: Set Python version
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: uv python install $PYTHON_VERSION
      - name: Install LaTeX (one Ubuntu job only)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # Best-effort install: examples/32_latex skips when latexmk is
          # absent, so a flaky/slow apt mirror degrades to "LaTeX example
          # skipped" instead of hanging the job and blocking releases.
          # Retries + a short per-connection timeout keep a degraded mirror
          # from burning the whole job budget (it was stalling ~60s/package).
          sudo apt-get update -qq || true
          sudo apt-get install -y --no-install-recommends \
            -o Acquire::Retries=5 -o Acquire::http::Timeout=20 \
            texlive-latex-base texlive-bibtex-extra latexmk \
            || echo "::warning::LaTeX install failed (apt mirror?); LaTeX example tests will be skipped"
      - name: Install dependencies
        run: uv sync
      - name: Extend Conan settings for new Apple Clang versions (macOS)
        if: runner.os == 'macOS'
        run: |
          CONAN_HOME=$(uvx conan config home)
          cat > "$CONAN_HOME/settings_user.yml" << 'EOF'
          compiler:
              apple-clang:
                  version: ["18"]
          EOF
      - name: Run unit tests (Windows)
        if: runner.os == 'Windows'
        run: uv run pytest -n auto --cov=pcons --cov-report=xml --ignore=tests/test_examples.py -k "not 21_msvcup_hello"
      - name: Run tests (non-Windows)
        if: runner.os != 'Windows'
        run: uv run pytest -n auto --cov=pcons --cov-report=xml -k "not 21_msvcup_hello"
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ${{ matrix.os }}

  test-examples-windows:
    name: "test examples (windows-latest, ${{ matrix.python-version }})"
    needs: lint
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
      - name: Set Python version
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: uv python install $PYTHON_VERSION
      - name: Install dependencies
        run: uv sync
      - name: Run example tests
        run: uv run pytest tests/test_examples.py --cov=pcons --cov-report=xml -k "not 21_msvcup_hello"
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: windows-examples

  test-wasm:
    name: "test wasm (emscripten + wasi)"
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@4528d102f7230f0e7b276855c01ea1159be0e984 # v16
        with:
          actions-cache-folder: 'emsdk-cache'
      - name: Install wasi-sdk
        run: |
          WASI_VERSION=32  # v31 was broken on macOS: hardcoded rpath (wasi-sdk#622), fixed in v32
          WASI_VERSION_FULL=${WASI_VERSION}.0
          ARCH=$(uname -m)
          case "$(uname -s)" in
            Linux)  OS=linux ;;
            Darwin) OS=macos ;;
            *)      echo "Unsupported OS"; exit 1 ;;
          esac
          curl -sSfL "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_VERSION}/wasi-sdk-${WASI_VERSION_FULL}-${ARCH}-${OS}.tar.gz" | tar xz
          sudo mv "wasi-sdk-${WASI_VERSION_FULL}-${ARCH}-${OS}" /opt/wasi-sdk
      - name: Install wasmtime
        uses: jcbhmr/setup-wasmtime@960c367a99921eb0b02f5778fce9ae8f110bf0f0 # v2
      - name: Install dependencies
        run: uv sync
      - name: Verify Emscripten tools
        run: |
          emcc --version
          node --version
      - name: Verify WASI tools
        id: verify-wasi
        continue-on-error: true
        run: |
          wasmtime --version
          /opt/wasi-sdk/bin/clang --version
      - name: Run Emscripten example tests
        run: uv run pytest tests/test_examples.py --cov=pcons --cov-report=xml -v -k "23_wasm_emscripten"
      - name: Run WASI example tests
        if: steps.verify-wasi.outcome == 'success'
        env:
          WASI_SDK_PATH: /opt/wasi-sdk
        run: uv run pytest tests/test_examples.py --cov=pcons --cov-report=xml --cov-append -v -k "22_wasm_wasi"
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: wasm

  test-msvcup:
    name: "test msvcup (windows, no VS)"
    needs: lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
      # No MSVC setup - msvcup installs its own toolchain
      - name: Set Python version
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync
      - name: Run msvcup example tests
        run: uv run pytest tests/test_examples.py --cov=pcons --cov-report=xml -k "21_msvcup_hello" tests/contrib/test_msvcup.py -v
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: msvcup

  test-cxx-modules:
    name: "test C++20 modules (${{ matrix.os }})"
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
      - name: Set up clang tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo update-alternatives --install /usr/bin/clang-scan-deps clang-scan-deps \
            /usr/bin/clang-scan-deps-18 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ \
            /usr/bin/clang++-18 100
          sudo update-alternatives --install /usr/bin/clang clang \
            /usr/bin/clang-18 100
      - name: Add Homebrew LLVM to PATH (macOS)
        if: runner.os == 'macOS'
        run: echo "$(brew --prefix llvm@18)/bin" >> $GITHUB_PATH
      - name: Install dependencies
        run: uv python install 3.12 && uv sync
      - name: Install libc++ for `import std;` (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libc++-18-dev libc++abi-18-dev
      - name: Install gcc-15 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update

          sudo apt-get install -y gcc-15 g++-15

          sudo update-alternatives --install /usr/bin/gcc gcc \
            /usr/bin/gcc-15 100
          sudo update-alternatives --install /usr/bin/g++ g++ \
            /usr/bin/g++-15 100
      - name: Run C++20 modules example tests
        run: uv run pytest tests/test_examples.py --cov=pcons --cov-report=xml -k "29_cxx_modules or 30_cxx_partitions or 31_cxx_modules_optin or 32_cxx_import_std or 35_cxx_modules_deps or 39_bmi_compat" -v
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: cxx-modules

  test-rez:
    name: "test rez integration (${{ matrix.os }})"
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        # rez targets Linux/macOS; the example skips on Windows (see its test.toml).
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
      - name: Install dependencies (with rez)
        # rez is installed into the project venv so its plugin lands on the
        # same sys.path pcons does (that's how rez discovers the build_system
        # plugin). uv sync would uninstall it, so every run below uses
        # --no-sync.
        run: |
          uv python install 3.12
          uv sync
          uv pip install rez
      - name: Run rez integration unit tests
        run: uv run --no-sync pytest tests/integration/ --cov=pcons --cov-report=xml -v
      - name: Build the rez test packages and run the example end-to-end
        # hello_lib (rez's built-in cmake build_system) then hello_app (pcons's
        # build_system plugin — exercises PconsBuildSystem.build()); then run
        # example 45's test inside the resolve so REZ_USED_RESOLVE is set.
        run: |
          export REZ_LOCAL_PACKAGES_PATH="$RUNNER_TEMP/rez_packages"
          export REZ_RELEASE_PACKAGES_PATH="$RUNNER_TEMP/rez_packages"
          export REZ_PACKAGES_PATH="$RUNNER_TEMP/rez_packages"
          mkdir -p "$REZ_LOCAL_PACKAGES_PATH"
          export PATH="$PWD/.venv/bin:$PATH"
          ( cd examples/45_rez_integration/rez_packages/hello_lib && rez-build -i )
          ( cd examples/45_rez_integration/rez_packages/hello_app && rez-build -i )
          rez-env hello_lib -- uv run --no-sync pytest tests/test_examples.py \
            --cov=pcons --cov-report=xml --cov-append -k "45_rez_integration" -v
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: rez

  release:
    name: Create Release & Publish
    needs: [test, test-examples-windows, test-wasm, test-msvcup, test-cxx-modules, test-rez]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
      - name: Build package
        run: uv build
      - name: Sign distributions with Sigstore
        uses: sigstore/gh-action-sigstore-python@5b79a39c381910c090341a2c9b0bf022c8b387e1 # v3.4.0
        with:
          inputs: ./dist/*.tar.gz ./dist/*.whl
          upload-signing-artifacts: false
          release-signing-artifacts: false
      - name: Generate Changelog
        run: .github/release_message.sh > release_message.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          body_path: release_message.md
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/*.sigstore.json
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: uvx twine upload dist/*.tar.gz dist/*.whl
